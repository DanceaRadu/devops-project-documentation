version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /mnt/user/appdata/prometheus/etc:/etc/prometheus/
      - /mnt/user/appdata/prometheus/data:/prometheus
    networks:
      - unraid-monitoring
      - beamful-monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3003:3000"
    volumes:
      - /mnt/user/appdata/grafana:/var/lib/grafana
    networks:
      - unraid-monitoring
    environment:
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.gmail.com:587"
      GF_SMTP_USER: ""
      GF_SMTP_PASSWORD: ""
      GF_SMTP_FROM_ADDRESS: ""
      GF_SMTP_FROM_NAME: "Grafana"
      GF_SERVER_ROOT_URL: ""
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro'
    networks:
      - unraid-monitoring

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - /mnt/user/appdata/loki:/loki
    networks:
      - unraid-monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/user/appdata/promtail/config:/etc/promtail
      - /mnt/user/appdata/NginxProxyManager/logs:/npm-logs:ro
    networks:
      - unraid-monitoring
    command: -config.file=/etc/promtail/promtail-config.yml

networks:
  unraid-monitoring:
  beamful-monitoring:
    external: true
